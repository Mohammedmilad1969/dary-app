name: dary
description: A minimal Flutter app with Material 3 design
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.2.7
  image_picker: ^1.0.7
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  # Firebase dependencies (web-compatible)
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.1
  firebase_app_installations: ^0.3.3
  # firebase_auth_web removed due to compatibility issues - using google_sign_in instead
  google_sign_in: ^6.2.1  # Google Sign-In
  # firebase_storage: ^11.5.6  # Web compatibility issues
  firebase_auth: ^5.4.1     # Re-enabled for SMS verification
  # Notification dependencies (web-compatible)
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  supabase_flutter: ^2.0.0
  url_launcher: ^6.3.0
  share_plus: ^7.2.1
  video_player: ^2.8.2
  google_generative_ai: ^0.4.4
  cloud_functions: ^5.0.0
  webview_flutter: ^4.13.0
  crypto: ^3.0.3
  font_awesome_flutter: ^10.12.0
  flutter_image_compress: ^2.4.0
  connectivity_plus: ^6.1.0
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0
  
  

  path_provider: any
  flutter_native_splash: ^2.4.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/dary.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/splash_video.MP4
    - assets/images/home_intro.jpg
    - assets/images/dary_logo.png
    - assets/images/abstract.jpg
    - assets/images/darylogo2.png
    - assets/images/onboarding_house.png
    - assets/images/onboarding_search.png
    - assets/images/onboarding_secure.png

flutter_native_splash:
  color: "#01352D"
  image: "assets/images/darylogo2.png"
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#01352D"
    image: "assets/images/darylogo2.png"
