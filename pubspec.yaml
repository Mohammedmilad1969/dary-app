name: dary
description: A minimal Flutter app with Material 3 design
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.2.7
  image_picker: ^1.0.7
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  # Firebase dependencies (web-compatible)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  # firebase_storage: ^11.5.6  # Web compatibility issues
  # firebase_auth: ^4.15.3     # Web compatibility issues
  # Notification dependencies (web-compatible)
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  supabase_flutter: ^2.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  generate: true
